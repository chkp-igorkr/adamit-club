<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Island — 3D</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #e5dfd3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #333; }
  #info { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.78); padding: 8px 12px; border-radius: 8px; font-size: 12px; line-height: 1.4; max-width: 320px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  #info b { color: #b07a3a; }
  #info kbd { background: #f2efe9; border: 1px solid #ccc; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>
<script>
window.OAK_DATA_URL = "./oak.png";
window.CAB_DATA_URL = "./cab.jpg";
window.CAB2_DATA_URL = "./cab2.jpg";
</script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ----- Renderer / Scene / Camera -----
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e2d4);

// Holds items the 'D' button on the version selector toggles: stools, lamps,
// countertop items, wall shelves (and their contents), and the D-side wall.
const presentationGroup = new THREE.Group();
scene.add(presentationGroup);

// Same toggle, but for items that need to live inside `island` (so they inherit
// the mm→m scale). Attached to island when island is created.
const cubbyItemsGroup = new THREE.Group();

// Supplementary lights — only active when the presentation group is hidden,
// to compensate for the 5 pendant point lights that turn off with the group.
const suppHemi = new THREE.HemisphereLight(0xfff4e0, 0x6b6354, 0.7);
suppHemi.visible = false;
scene.add(suppHemi);
const suppOverhead = new THREE.DirectionalLight(0xffe8c8, 0.9);
suppOverhead.position.set(0, 8, 0);
suppOverhead.visible = false;
scene.add(suppOverhead);
// Extra warm fill from the south-east (incoming from +x, -z).
const suppSE = new THREE.DirectionalLight(0xffe0b8, 0.9);
suppSE.position.set(6, 5, -5);
suppSE.visible = false;
scene.add(suppSE);

window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'togglePresentation') {
    presentationGroup.visible = e.data.visible !== false;
    cubbyItemsGroup.visible   = presentationGroup.visible;
    // Pendants live inside presentationGroup, so when the group is hidden the
    // scene loses ~12 units of warm point light. Turn on the supplementary
    // hemisphere + overhead fill + SE accent to keep the bar properly lit.
    suppHemi.visible     = !presentationGroup.visible;
    suppOverhead.visible = !presentationGroup.visible;
    suppSE.visible       = !presentationGroup.visible;
  } else if (e.data.type === 'toggleShelves') {
    // Swap the middle-shelf material between dark gray (plinth) and cab.
    // `middleShelves` is populated later in this script; this handler only
    // runs after the page is fully loaded, so the closure resolves correctly.
    const useCab = !!e.data.useCab;
    for (const s of middleShelves) {
      s.mesh.material = useCab ? s.cabMatArr : plinthMat;
    }
  }
});

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.05, 60);
camera.position.set(4.8, 2.6, 4.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.6, 0);
controls.minDistance = 1.5;
controls.maxDistance = 15;
controls.maxPolarAngle = Math.PI / 2 - 0.02;

// ----- Lighting -----
scene.add(new THREE.HemisphereLight(0xfff4e0, 0x6b6354, 0.18));

const sun = new THREE.DirectionalLight(0xffcc99, 0.6);
sun.position.set(4.5, 7.5, 3.0);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const d = 6;
Object.assign(sun.shadow.camera, { left: -d, right: d, top: d, bottom: -d, near: 0.1, far: 22 });
sun.shadow.bias = -0.00015;
sun.shadow.normalBias = 0.02;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc8d8ff, 0.55);
fill.position.set(-4, 3.5, -2);
scene.add(fill);

// Extra warm light from the south (incoming from -z, shines toward +z = N).
const southLight = new THREE.DirectionalLight(0xffd8a0, 0.7);
southLight.position.set(0, 4, -5);
scene.add(southLight);

// ----- Shared Image loader (one decode per file, many Three.Textures) -----
// `insetPx` crops the given number of pixels off every edge — useful when the
// source photo has 1-2 light pixels at the border that show as a white seam
// under MirroredRepeat sampling.
function makeImageSource(dataURL, insetPx = 0) {
  const img = new Image();
  const pending = [];
  const src = { img, loaded: false, pending };
  img.onload = () => {
    let out = img;
    if (insetPx > 0) {
      const w = img.naturalWidth, h = img.naturalHeight;
      const c = document.createElement('canvas');
      c.width  = w - 2 * insetPx;
      c.height = h - 2 * insetPx;
      c.getContext('2d').drawImage(
        img,
        insetPx, insetPx, c.width, c.height,
        0, 0, c.width, c.height
      );
      out = c;
    }
    src.img = out;
    src.loaded = true;
    for (const t of pending) { t.image = out; t.needsUpdate = true; }
  };
  img.src = dataURL;
  return src;
}
function makeTex(src, repeatU, repeatV, rotation = 0) {
  const t = new THREE.Texture();
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.MirroredRepeatWrapping;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  t.repeat.set(repeatU, repeatV);
  if (rotation) { t.rotation = rotation; t.center.set(0.5, 0.5); }
  if (src.loaded) { t.image = src.img; t.needsUpdate = true; }
  else src.pending.push(t);
  return t;
}

const oakSrc  = makeImageSource(window.OAK_DATA_URL, 3);
const cabSrc  = makeImageSource(window.CAB_DATA_URL);
const cab2Src = makeImageSource(window.CAB2_DATA_URL);

// ExtrudeGeometry's default UV generator uses raw shape coordinates (mm here),
// so `repeat` has to be 1/(tile size in mm).
const loadOak  = (u, v, r = 0) => makeTex(oakSrc,  u, v, r);
const loadCab  = (u, v, r = 0) => makeTex(cabSrc,  u, v, r);
const loadCab2 = (u, v, r = 0) => makeTex(cab2Src, u, v, r);

// oak.png is 820 × 505 — planks run horizontally in the image (along the 820 px
// axis). Slab/corbel UVs come from ExtrudeGeometry (in mm): u = world.x, v = world.z.
// Rotate +90° so the photo's plank axis aligns with UV.v = world.z = B leg.
// Tile size keeps the photo's aspect (505/820).
const OAK_TILE_V = 750;
const OAK_TILE_U = OAK_TILE_V * 505 / 820;
const slabOakTex = loadOak(1 / OAK_TILE_U, 1 / OAK_TILE_V, Math.PI / 2);
slabOakTex.center.set(0, 0);   // avoid mm-scale UV precision gaps

const oakMat = new THREE.MeshStandardMaterial({
  map: slabOakTex,
  color: 0xb89066,    // tint multiplies the photo to darken/warm
  roughness: 0.55,
  metalness: 0.02,
});

// Floor: plain matte grey.
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x9a9a9a,
  roughness: 1.0,
  metalness: 0.0,
});

// Cabinet sides: panel texture (dm1415.jpg). Side-wall UVs span shape perimeter
// (mm) in U and the cabinet height (820 mm) in V — tile size chosen accordingly.
const cabTex = loadCab(1 / 800, 1 / 820);
const cabinetMat = new THREE.MeshStandardMaterial({
  map: cabTex,
  color: 0xffffff,
  roughness: 0.55,
  metalness: 0.0,
});

// Single dark-gray material used everywhere (plinth, middle shelves, D-face
// cover, etc.) — fully matte so it reads as a velvety painted surface with no
// satin highlights.
const plinthMat = new THREE.MeshStandardMaterial({
  color: 0x4a4a4a,
  roughness: 1.0,
  metalness: 0.0,
});

// Stool seats use the same oak photo but on CylinderGeometry UVs ([0,1] range);
// 2 tiles across each seat reads as a few planks.
const seatOakTex = loadOak(2, 2);
const stoolSeatMat = new THREE.MeshStandardMaterial({
  map: seatOakTex,
  color: 0xb89066,
  roughness: 0.32,
  metalness: 0.05,
});
const stoolLegMat  = new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.9, metalness: 0.0 });

// ----- Floor -----
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ----- Walls -----
const wallMat = new THREE.MeshStandardMaterial({ color: 0xf2ece0, roughness: 0.95 });

// Backdrop wall behind the room.
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 8), wallMat);
backWall.position.set(0, 4, -6);
backWall.receiveShadow = true;
presentationGroup.add(backWall);

// D-side wall — anchors the shelves and grounds the scene on the west side.
// Built as 3 panels around a 700 mm × 2000 mm opening 600 mm north of the slab.
const DWALL_THICKNESS = 0.10;
const DWALL_X = -1.35 - DWALL_THICKNESS / 2;  // +x face flush with the bar's D face
const DWALL_Y_TOP = 5;
const DWALL_Z_S  = -7;
const DWALL_Z_N  =  5;
const OPENING_W = 0.70;
const OPENING_H = 2.00;
// Two openings — sorted south → north.
const openings = [
  { s: -1.5 - 0.9 - 0.9,       n: -1.5 - 0.9 },              // 900 mm wide, 900 mm south of C
  { s: -0.58 + 0.6,            n: -0.58 + 0.6 + OPENING_W }, // 700 mm wide, 600 mm north of E
];

// East face opaque, west face 25% opaque — wall appears solid from the east
// (camera side) but you can see through it when looking west → east.
const dWallOpaque = new THREE.MeshStandardMaterial({ color: 0xf2ece0, roughness: 0.95 });
const dWallSheer  = new THREE.MeshStandardMaterial({
  color: 0xf2ece0, roughness: 0.95, transparent: true, opacity: 0,
  depthWrite: false,   // opacity 0 — must not occlude objects behind it
});
const dWallMats = [
  dWallOpaque,   // +x (east — visible from east camera)
  dWallSheer,    // -x (west — visible from west, see-through)
  dWallOpaque,   // +y
  dWallOpaque,   // -y
  dWallOpaque,   // +z
  dWallOpaque,   // -z
];
function addDWallPanel(zCenter, zSize, yCenter, ySize) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(DWALL_THICKNESS, ySize, zSize), dWallMats);
  m.position.set(DWALL_X, yCenter, zCenter);
  m.castShadow = true;
  m.receiveShadow = true;
  presentationGroup.add(m);
}

// Solid panels between/around openings (full wall height).
let prevZ = DWALL_Z_S;
for (const o of openings) {
  addDWallPanel((prevZ + o.s) / 2, o.s - prevZ, DWALL_Y_TOP / 2, DWALL_Y_TOP);
  prevZ = o.n;
}
addDWallPanel((prevZ + DWALL_Z_N) / 2, DWALL_Z_N - prevZ, DWALL_Y_TOP / 2, DWALL_Y_TOP);

// Lintel above each opening.
for (const o of openings) {
  addDWallPanel((o.s + o.n) / 2, o.n - o.s, (OPENING_H + DWALL_Y_TOP) / 2, DWALL_Y_TOP - OPENING_H);
}


// ----- L-shape island -----
// Working units: millimeters. We scale the group at the end.
const S = 0.001;
const island = new THREE.Group();

// L dimensions (B = short leg along x, C = long leg along z).
const B_LEN = 2700;             // was 3000
const C_LEN = 3000;             // was 2700
const DEPTH = 920;              // shared leg depth
const CORNER_X = B_LEN - DEPTH; // 1780, inside corner of the L

function lShape(insets, bRadius = 0, aRadius = 0) {
  const [d1, d2, d3, d4, d5, d6] = insets;
  const xR = B_LEN  - d2;                      // B-side outer x
  const yT = C_LEN  - d3;                      // A-side / top  y
  const xI = CORNER_X + d4;                    // inside corner x (left end of A)
  const s = new THREE.Shape();
  s.moveTo(d6, d1);

  // C-front edge → front-right corner (P2)
  if (bRadius > 0) {
    s.lineTo(xR - bRadius, d1);
    s.absarc(xR - bRadius, d1 + bRadius, bRadius, -Math.PI / 2, 0, false);
  } else {
    s.lineTo(xR, d1);
  }

  // B edge → back-right corner (P3)
  if (bRadius > 0) {
    s.lineTo(xR, yT - bRadius);
    s.absarc(xR - bRadius, yT - bRadius, bRadius, 0, Math.PI / 2, false);
  } else {
    s.lineTo(xR, yT);
  }

  // A edge → A-side left corner (P4)
  if (aRadius > 0) {
    s.lineTo(xI + aRadius, yT);
    s.absarc(xI + aRadius, yT - aRadius, aRadius, Math.PI / 2, Math.PI, false);
  } else {
    s.lineTo(xI, yT);
  }

  s.lineTo(xI, DEPTH - d5);
  s.lineTo(d6, DEPTH - d5);
  s.closePath();
  return s;
}

// Build an L-shaped slab whose TOP face sits at world-y = yTop, extruding downward by `height`.
function lMesh(insets, height, yTop, material, bevel = false, bRadius = 0, aRadius = 0) {
  const opts = bevel
    ? { depth: height, bevelEnabled: true, bevelSize: 4, bevelThickness: 3, bevelSegments: 4 }
    : { depth: height, bevelEnabled: false };
  const g = new THREE.ExtrudeGeometry(lShape(insets, bRadius, aRadius), opts);
  // Default extrudes along +z. Rotate so it extrudes downward in world (-y).
  g.rotateX(Math.PI / 2);
  const m = new THREE.Mesh(g, material);
  m.position.y = yTop;
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// Plinth (toe-kick): 150 mm tall, set back 20 mm from cabinet face.
// d6 = 0: D side runs flush to the wall.
island.add(lMesh([320, 320, 170, 320, 70, 0], 150, 150, plinthMat));

// ----- F-face recess positions (used by both the cabinet body cut-outs and
// the open-shelf interior below) -----
// Constants must match the corbel section defined further down (COR_W = 40,
// COR_FOOT_Y = 150, COUNTER_BOTTOM = 1020).
const F_CORBEL_YS_ARR = [1100, 1650, 2200, 2750];
const F_WALL_Z_KEEP   = 50;              // wall strip beside each corbel
const F_WALL_Y_KEEP   = 50;              // wall strip at top and bottom of each compartment
const F_RECESS_DEPTH  = 250;             // depth cut into the cabinet from the F face
const F_COMP_Y_BOT    = 150  + F_WALL_Y_KEEP;     // 200 — recess floor
const F_COMP_Y_TOP    = 1020 - F_WALL_Y_KEEP;     // 970 — recess ceiling
const F_COMP_H        = F_COMP_Y_TOP - F_COMP_Y_BOT;

// F corbels render with rotation.y = π, so their actual world-z extent is
// [along − 3·COR_W/2, along − COR_W/2]. Compute compartment edges from the
// real corbel faces so the 70 mm strips are symmetric around each corbel.
const COR_W_K = 40;
const F_RECESS_ZS = [];
for (let i = 0; i < F_CORBEL_YS_ARR.length - 1; i++) {
  const sN = F_CORBEL_YS_ARR[i]     - COR_W_K / 2;
  const nS = F_CORBEL_YS_ARR[i + 1] - COR_W_K * 3 / 2;
  F_RECESS_ZS.push([sN + F_WALL_Z_KEEP, nS - F_WALL_Z_KEEP]);
}

// Build an L-shape with T-shaped notches cut into the F edge: a narrow front
// section (the visible opening at the F face) and a wider back section that
// extends behind the cabinet wall strips on each side. Optionally also carves
// an L-shaped corner notch at the inside corner of the cabinet.
const F_FRONT_DEPTH = 20;          // depth of the visible front strip of cabinet wall
const F_SIDE_WIDEN  = 50;          // extra width on each z side behind the strip

// Corner-notch parameters: wraps the inside corner of the L with one branch
// carved east into the N-S arm (from the F face) and one branch carved south
// into the E-W arm (from the E face). Both branches meet at the inside corner.
const CORNER_F_NORTH_Z  = 1005;    // F-branch north edge — 50 mm south of southern F corbel
const CORNER_F_DEPTH    = 250;     // F-branch carved east into the cabinet
const CORNER_E_WEST_X   = 1790;    // E-branch west edge — 50 mm east of drawer east edge
const CORNER_E_DEPTH    = 250;     // E-branch carved south into the cabinet

function lShapeWithFNotches(insets, notches, frontDepth, sideWiden, totalDepth, cornerNotch) {
  const [d1, d2, d3, d4, d5, d6] = insets;
  const xR = B_LEN  - d2;
  const yT = C_LEN  - d3;
  const xI = CORNER_X + d4;
  const s = new THREE.Shape();
  s.moveTo(d6, d1);
  s.lineTo(xR, d1);
  s.lineTo(xR, yT);
  s.lineTo(xI, yT);
  const sorted = [...notches].sort((a, b) => b[1] - a[1]);   // by zN descending
  for (const [zS, zN] of sorted) {
    s.lineTo(xI, zN);                                          // F edge → top of opening
    s.lineTo(xI + frontDepth, zN);                             // east along narrow top wall
    s.lineTo(xI + frontDepth, zN + sideWiden);                 // north — widen behind strip
    s.lineTo(xI + totalDepth, zN + sideWiden);                 // east along wide top wall
    s.lineTo(xI + totalDepth, zS - sideWiden);                 // south along back wall
    s.lineTo(xI + frontDepth, zS - sideWiden);                 // west along wide bottom wall
    s.lineTo(xI + frontDepth, zS);                             // north — close widening at south
    s.lineTo(xI, zS);                                          // west back to F edge
  }
  if (cornerNotch) {
    // L-shaped corner notch: F branch + connector wedge + E branch carved as
    // one contiguous cavity. The inside corner of the cabinet wood is removed.
    s.lineTo(xI, cornerNotch.fNorthZ);                                       // F edge → top of F-side opening
    s.lineTo(xI + cornerNotch.fDepth, cornerNotch.fNorthZ);                  // east along F-side top wall
    s.lineTo(xI + cornerNotch.fDepth, DEPTH - d5 - cornerNotch.eDepth);      // south down the combined back/east wall
    s.lineTo(cornerNotch.eWestX, DEPTH - d5 - cornerNotch.eDepth);           // west along E-side south wall
    s.lineTo(cornerNotch.eWestX, DEPTH - d5);                                // north up to E face
  } else {
    s.lineTo(xI, DEPTH - d5);
  }
  s.lineTo(d6, DEPTH - d5);
  s.closePath();
  return s;
}

// Cabinet body: 870 mm tall, with the F face actually carved into the wood at
// the compartment positions. 300 mm overhang on B/C/F/A; 50 mm on E; D flush.
const cabinetInsets = [300, 300, 150, 300, 50, 0];
const cornerNotchParams = {
  fNorthZ: CORNER_F_NORTH_Z,
  fDepth:  CORNER_F_DEPTH,
  eWestX:  CORNER_E_WEST_X,
  eDepth:  CORNER_E_DEPTH,
};
const cabinetShape  = lShapeWithFNotches(cabinetInsets, F_RECESS_ZS, F_FRONT_DEPTH, F_SIDE_WIDEN, F_RECESS_DEPTH, cornerNotchParams);
const cabinetGeom   = new THREE.ExtrudeGeometry(cabinetShape, { depth: 870, bevelEnabled: false });
cabinetGeom.rotateX(Math.PI / 2);
const cabinetMesh   = new THREE.Mesh(cabinetGeom, cabinetMat);
cabinetMesh.position.y = 1020;
cabinetMesh.castShadow = true;
cabinetMesh.receiveShadow = true;
island.add(cabinetMesh);

// D-side face cover: paint the cabinet's west face (flush with the D wall) in
// the plinth's dark gray. The face spans z=[d1, DEPTH−d5] = [300, 870] and
// y=[150, 1020]. A thin panel just west of x=0 overlays the cabinet wood.
{
  const dFaceW = (920 - 50) - 300;   // 570 mm (z extent)
  const dFaceH = 1020 - 150;          // 870 mm (y extent)
  const dFacePanel = new THREE.Mesh(
    new THREE.BoxGeometry(2, dFaceH, dFaceW),
    plinthMat
  );
  dFacePanel.position.set(-1, 150 + dFaceH / 2, 300 + dFaceW / 2);
  dFacePanel.castShadow = true;
  dFacePanel.receiveShadow = true;
  island.add(dFacePanel);
}

// Each compartment now has a T-shaped void: narrow opening at the F face, wider
// cavity behind. Seal the top and bottom with two box pieces per compartment
// (front-narrow and back-wide) so the recess height stays 770 mm. Cab textures
// are scaled per face to keep the wood pattern at consistent physical scale.
const F_RECESS_W      = F_RECESS_ZS[0][1] - F_RECESS_ZS[0][0];   // 420
const F_RECESS_W_WIDE = F_RECESS_W + 2 * F_SIDE_WIDEN;            // 520
const F_BACK_DEPTH    = F_RECESS_DEPTH - F_FRONT_DEPTH;           // 230

function makeBoxCabMat(faceW, faceH) {
  const tex = loadCab(faceW / 800, faceH / 820);
  return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.55, metalness: 0.0 });
}
// BoxGeometry face UVs: ±x uses (D,H), ±y uses (W,D), ±z uses (W,H).
function makeBoxCabMatArray(W, H, D) {
  return [
    makeBoxCabMat(D, H),  // +x
    makeBoxCabMat(D, H),  // -x
    makeBoxCabMat(W, D),  // +y
    makeBoxCabMat(W, D),  // -y
    makeBoxCabMat(W, H),  // +z
    makeBoxCabMat(W, H),  // -z
  ];
}
// Same approach for cab2 — preserves physical tile scale across surfaces.
function makeBoxCab2Mat(faceW, faceH) {
  const tex = loadCab2(faceW / 800, faceH / 820);
  return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.55, metalness: 0.0 });
}
function makeBoxCab2MatArray(W, H, D) {
  return [
    makeBoxCab2Mat(D, H),  // +x
    makeBoxCab2Mat(D, H),  // -x
    makeBoxCab2Mat(W, D),  // +y
    makeBoxCab2Mat(W, D),  // -y
    makeBoxCab2Mat(W, H),  // +z
    makeBoxCab2Mat(W, H),  // -z
  ];
}

const matCoverFront = makeBoxCabMatArray(F_FRONT_DEPTH, F_WALL_Y_KEEP, F_RECESS_W);
const matCoverBack  = makeBoxCabMatArray(F_BACK_DEPTH,  F_WALL_Y_KEEP, F_RECESS_W_WIDE);

const F_FACE_X_E = CORNER_X + 300;       // 2080, world x of F face
for (const [zS, zN] of F_RECESS_ZS) {
  const wNarrow = zN - zS;
  const wWide   = wNarrow + 2 * F_SIDE_WIDEN;
  const zC      = (zS + zN) / 2;
  const xCFront = F_FACE_X_E + F_FRONT_DEPTH / 2;
  const xCBack  = F_FACE_X_E + F_FRONT_DEPTH + F_BACK_DEPTH / 2;

// ----- Stacked drawers on the E face -----

// running x = 0 → 2080. Two adjacent columns of 5 drawers each (850 mm wide),

const E_FACE_Y       = DEPTH - 50;     // 870, north-facing wall of E-W arm

const DRAWER_COUNT   = 4;
const DRAWER_GAP     = 3;

const MID_DRAWER_H    = 215.25;

const BOTTOM_DRAWER_H = TOTAL_DRAWER_H - TOP_DRAWER_H - (DRAWER_COUNT - 2) * MID_DRAWER_H;
const drawerHeightAt  = i => (
  i === 0                  ? BOTTOM_DRAWER_H :
  i === DRAWER_COUNT - 1   ? TOP_DRAWER_H :
                             MID_DRAWER_H
);

const drawerLineMat = new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.7, metalness: 0.1 });
const LINE_T   = 5;           // line thickness in mm
const HANDLE_W = 280;         // handle bar length
const HANDLE_T    = 10;       // handle bar visible height
const HANDLE_PROJ = 25;       // how far the handle sticks out from the cabinet face

function addDrawerBar(xC, yC, lenX, lenY, t = LINE_T) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(lenX, lenY, t),
    drawerLineMat
  );

}

const DRAWER_COLUMN_X = [40, 40 + DRAWER_W];   // west edge of each column; columns share a divider line
for (const colX of DRAWER_COLUMN_X) {
  const x0 = colX;
  const x1 = colX + DRAWER_W;
  const xMid = (x0 + x1) / 2;
  let yBot = CAB_Y_BOT;
  for (let i = 0; i < DRAWER_COUNT; i++) {
    const h    = drawerHeightAt(i);
    const yTop = yBot + h;
    const yMid = (yBot + yTop) / 2;

    addDrawerBar(xMid, yBot, DRAWER_W + LINE_T, LINE_T);              // bottom edge
    addDrawerBar(xMid, yTop, DRAWER_W + LINE_T, LINE_T);              // top edge
    addDrawerBar(x0,   yMid, LINE_T, h);                              // left edge
    addDrawerBar(x1,   yMid, LINE_T, h);                              // right edge
    addDrawerBar(xMid, yTop - 35, HANDLE_W, HANDLE_T, HANDLE_PROJ);   // handle bar

// ----- Sweeping oak corbels under the overhangs on B and C -----
// Vertical edge flush against the cabinet face, top edge against the counter
// underside (250 mm horizontal projection), foot 150 mm above the floor.
// The outer profile is an exponential curve from 0 at the foot to 250 at the top.
const COR_W = 40;                       // thickness along face direction
const COR_D = 260;                      // horizontal projection at the top
const COUNTER_BOTTOM = 1020;
const COR_FOOT_Y = 150;                 // 150 mm above the floor
const COR_H = COUNTER_BOTTOM - COR_FOOT_Y;   // 870

const COR_FOOT_X = 20;                  // 20 mm out at the foot
const corbelShape = new THREE.Shape();
corbelShape.moveTo(0, 0);               // top-cabinet
corbelShape.lineTo(COR_D, 0);           // top-outer
// Exponential curve from (COR_D, 0) down to (COR_FOOT_X, -COR_H), fitted as a
// Catmull-Rom spline so the polyline facets disappear.
const K = 16, DENOM = Math.exp(K) - 1, SEGMENTS = 40;
const curvePts = [];
for (let i = 1; i <= SEGMENTS; i++) {
  const t = i / SEGMENTS;               // 0 → top, 1 → foot
  const y = -COR_H * t;
  const x = COR_FOOT_X + (COR_D - COR_FOOT_X) * (Math.exp(K * (1 - t)) - 1) / DENOM;
  curvePts.push(new THREE.Vector2(x, y));
}
corbelShape.splineThru(curvePts);
corbelShape.lineTo(0, -COR_H);          // foot back toward the cabinet
corbelShape.closePath();                // vertical edge back up to (0, 0)
const corbelGeom = new THREE.ExtrudeGeometry(corbelShape, {
  depth: COR_W, bevelEnabled: false,
});

// normalSign: which way the corbel projects from the face.
//   faceAxis='x', +1 → +x; -1 → -x.
//   faceAxis='z', -1 → -z (default for C); +1 → +z.
function addCorbels(faceAxis, faceCoord, alongStart, alongEnd, count, normalSign = -1, useEndpoints = false) {
  const len = alongEnd - alongStart;
  for (let i = 0; i < count; i++) {
    const along = useEndpoints && count > 1
      ? alongStart + len * i / (count - 1)
      : alongStart + len * (i + 0.5) / count;
    const m = new THREE.Mesh(corbelGeom, oakMat);
    if (faceAxis === 'x') {
      if (normalSign < 0) m.rotation.y = Math.PI;     // flip +x to -x
      m.position.set(faceCoord, COUNTER_BOTTOM, along - COR_W / 2);
    } else {
      m.rotation.y = normalSign < 0 ? Math.PI / 2 : -Math.PI / 2;
      m.position.set(along - COR_W / 2, COUNTER_BOTTOM, faceCoord);
    }
    m.castShadow = true; m.receiveShadow = true;
    island.add(m);
  }
}

addCorbels('x', 2400, 400, 2750, 5, +1, true);   // B side, 5 corbels, endpoints 100 mm from cabinet edges
addCorbels('z',  300, 100, 2300, 5, -1, true);   // C side, 5 corbels, endpoints 100 mm from cabinet edges
addCorbels('x', 2080, 2750, 1100, 4, -1, true);   // F side, 4 corbels, 100 mm from north edge, 550 mm spacing

// ----- Open shelves inside the F-face recesses -----
// 2 internal 20 mm cab-textured boards per recess divide it into 3 cubbies.
// Shelves start at x = F_FRONT_DEPTH (just behind the cabinet front strip)
// and run to the back wall. Shelf width = opening + 2·F_SIDE_WIDEN, so the
// shelves fill the wider cavity behind the strips on each side.
const F_BOARD_T = 20;
const F_SHELF_D = F_RECESS_DEPTH - F_FRONT_DEPTH;            // 230 — depth behind the strip
const F_SHELF_W = F_RECESS_W + 2 * F_SIDE_WIDEN;             // 520 — matches the widened cavity

// All "middle" shelves are tracked here so the S toggle can swap their
// material between dark gray (plinthMat) and a per-face cab texture array.
const middleShelves = [];
const matFShelfCab = makeBoxCabMatArray(F_SHELF_D, F_BOARD_T, F_SHELF_W);

for (const [zS, zN] of F_RECESS_ZS) {
  const zMid     = (zS + zN) / 2;
  const cubbyH   = (F_COMP_H - 2 * F_BOARD_T) / 3;
  const shelfBots = [
    F_COMP_Y_BOT + cubbyH,
    F_COMP_Y_BOT + 2 * cubbyH + F_BOARD_T,
  ];
  for (const sb of shelfBots) {
    const shelf = new THREE.Mesh(
      new THREE.BoxGeometry(F_SHELF_D, F_BOARD_T, F_SHELF_W),
      plinthMat
    );
    shelf.position.set(F_FACE_X_E + F_FRONT_DEPTH + F_SHELF_D / 2, sb + F_BOARD_T / 2, zMid);
    shelf.castShadow = true;
    shelf.receiveShadow = true;
    island.add(shelf);
    middleShelves.push({ mesh: shelf, cabMatArr: matFShelfCab });
  }
}

// ----- Corner L-cavity covers and shelves (E-F inside corner) -----
// The cabinet wood at the inside corner is fully carved away, so the F branch
// and the E branch merge into one continuous L-shaped cavity. We tile the L
// floor/ceiling/shelves with two boxes that meet at x = F_FACE_X_E so that
// the cavity reads as a single L.
const CORNER_F_REGION = {
  xC: F_FACE_X_E + CORNER_F_DEPTH / 2,                             // 2205
  W:  CORNER_F_DEPTH,                                              // 250
  zS: 870 - CORNER_E_DEPTH,                                         // 620 — south edge of L
  zN: CORNER_F_NORTH_Z,                                             // 1005 — north edge
  D:  CORNER_F_NORTH_Z - (870 - CORNER_E_DEPTH),                    // 385 — full L spine length
};
const CORNER_E_REGION = {
  xC: (CORNER_E_WEST_X + F_FACE_X_E) / 2,                           // 1935
  W:  F_FACE_X_E - CORNER_E_WEST_X,                                 // 290
  zS: 870 - CORNER_E_DEPTH,                                         // 620
  zN: 870,                                                          // E face line
  D:  CORNER_E_DEPTH,                                               // 250
};

const matCornerFCover    = makeBoxCabMatArray(CORNER_F_REGION.W, F_WALL_Y_KEEP, CORNER_F_REGION.D);
const matCornerECover    = makeBoxCabMatArray(CORNER_E_REGION.W, F_WALL_Y_KEEP, CORNER_E_REGION.D);
const matCornerFShelfCab = makeBoxCabMatArray(CORNER_F_REGION.W, F_BOARD_T,     CORNER_F_REGION.D);
const matCornerEShelfCab = makeBoxCabMatArray(CORNER_E_REGION.W, F_BOARD_T,     CORNER_E_REGION.D);

function addCornerRegion(region, coverMatArr, shelfCabMatArr) {
  const zC     = (region.zS + region.zN) / 2;
  const cubbyH = (F_COMP_H - 2 * F_BOARD_T) / 3;
  // Top + bottom covers seal the vertical channel to the 770 mm recess height.
  for (const yC of [150 + F_WALL_Y_KEEP / 2, 1020 - F_WALL_Y_KEEP / 2]) {
    const cover = new THREE.Mesh(
      new THREE.BoxGeometry(region.W, F_WALL_Y_KEEP, region.D),
      coverMatArr
    );
    cover.position.set(region.xC, yC, zC);
    cover.castShadow = true; cover.receiveShadow = true;
    island.add(cover);
  }
  // 2 internal matte dark-gray shelves dividing into 3 cubbies (the two regions
  // share the y coordinates so the shelves butt together to form one L).
  for (const sb of [F_COMP_Y_BOT + cubbyH, F_COMP_Y_BOT + 2 * cubbyH + F_BOARD_T]) {
    const shelf = new THREE.Mesh(
      new THREE.BoxGeometry(region.W, F_BOARD_T, region.D),
      plinthMat
    );
    shelf.position.set(region.xC, sb + F_BOARD_T / 2, zC);
    shelf.castShadow = true; shelf.receiveShadow = true;
    island.add(shelf);
    middleShelves.push({ mesh: shelf, cabMatArr: shelfCabMatArr });
  }
}

addCornerRegion(CORNER_F_REGION, matCornerFCover, matCornerFShelfCab);
addCornerRegion(CORNER_E_REGION, matCornerECover, matCornerEShelfCab);

// ----- Snack/box items on the inner shelves (toggleable with the D button) -----
island.add(cubbyItemsGroup);
{
  // Muted, warm pantry palette — fewer saturated colors, more browns/creams.
  const snackPalette = [
    0x8a4a3a,  // muted brick
    0xc9b48a,  // tan
    0x4a5a6a,  // slate blue-gray
    0x6e7a52,  // olive
    0x4e3a2a,  // dark chocolate
    0xe8dcc4,  // cream
    0xa8704c,  // terracotta
    0x322620,  // espresso
    0xd9c97a,  // pale mustard
    0x7c6a8a,  // dusty plum
    0x5a6b62,  // sage
    0x9a4a3a,  // muted red
    0xb88554,  // caramel
    0x4a3e54,  // muted purple
    0x2d3e3a,  // forest
    0x7a4830,  // rust
  ];
  const snackMats = snackPalette.map(c =>
    new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, metalness: 0.05 })
  );
  const lidMat = new THREE.MeshStandardMaterial({
    color: 0x2a2a2a, roughness: 0.4, metalness: 0.6,
  });

  let pIdx = 0;
  const nextMat = () => snackMats[(pIdx++) % snackMats.length];

  function makeBoxItem(w, h, d) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), nextMat());
    m.castShadow = true; m.receiveShadow = true;
    return m;
  }
  function makeJarItem(r, h) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, h, 24),
      nextMat()
    );
    body.castShadow = true; body.receiveShadow = true;
    g.add(body);
    const lidH = Math.max(8, h * 0.07);
    const lid = new THREE.Mesh(
      new THREE.CylinderGeometry(r * 0.94, r * 0.94, lidH, 24),
      lidMat
    );
    lid.position.y = h / 2 + lidH / 2;
    lid.castShadow = true; lid.receiveShadow = true;
    g.add(lid);
    return g;
  }

  // Place a row of varied items at the front of one cubby.
  // facing: '-x' (opening to west) or '+z' (opening to north).
  function fillCubby(xMin, xMax, yFloor, zMin, zMax, facing, count = 4) {
    const alongZ = facing === '-x';
    const wMin = alongZ ? zMin : xMin;
    const wMax = alongZ ? zMax : xMax;
    const widthLen = wMax - wMin;
    const slot = widthLen / count;
    const FRONT_INSET = 10;          // distance from opening to item front
    for (let i = 0; i < count; i++) {
      const wC = wMin + slot * (i + 0.5);
      const kind = (i * 3 + Math.floor(yFloor / 11)) % 5;
      let mesh, h, halfD;
      if (kind === 0) {
        // Tall cereal-style box
        const W = Math.min(slot * 0.85, 200), H = 240, D = 110;
        mesh = makeBoxItem(alongZ ? D : W, H, alongZ ? W : D);
        h = H; halfD = D / 2;
      } else if (kind === 1) {
        // Wider cookie box
        const W = Math.min(slot * 0.92, 230), H = 175, D = 130;
        mesh = makeBoxItem(alongZ ? D : W, H, alongZ ? W : D);
        h = H; halfD = D / 2;
      } else if (kind === 2) {
        // Tall jar with metal lid
        const R = Math.min(slot * 0.45, 70), H = 230;
        mesh = makeJarItem(R, H);
        h = H; halfD = R;
      } else if (kind === 3) {
        // Slim snack pack
        const W = Math.min(slot * 0.72, 170), H = 220, D = 95;
        mesh = makeBoxItem(alongZ ? D : W, H, alongZ ? W : D);
        h = H; halfD = D / 2;
      } else {
        // Squat tin
        const R = Math.min(slot * 0.5, 80), H = 140;
        mesh = makeJarItem(R, H);
        h = H; halfD = R;
      }
      // Slight rotation around y for some life.
      mesh.rotation.y = ((i + Math.floor(yFloor / 13)) % 3 - 1) * 0.1;
      // Per-item push toward the inside of the cubby (20–50 mm), seeded from
      // position so it's deterministic across reloads.
      const seed = Math.sin(i * 13.7 + yFloor * 0.07 + wC * 0.013) * 0.5 + 0.5;
      const pushIn = 20 + seed * 30;
      // Anchor near the FRONT of the cubby (close to the opening), then push in.
      let xC, zC;
      if (facing === '-x') {
        xC = xMin + halfD + FRONT_INSET + pushIn;
        zC = wC;
      } else { // '+z'
        xC = wC;
        zC = zMax - halfD - FRONT_INSET - pushIn;
      }
      mesh.position.set(xC, yFloor + h / 2, zC);
      cubbyItemsGroup.add(mesh);
    }
  }

  // 3 cubby floors per compartment: bottom-cover-top, top of first shelf,
  // top of second shelf.
  const _cubbyH = (F_COMP_H - 2 * F_BOARD_T) / 3;
  const CUBBY_FLOORS = [
    F_COMP_Y_BOT,                                   // 200
    F_COMP_Y_BOT +     _cubbyH + F_BOARD_T,         // 463.3
    F_COMP_Y_BOT + 2 * _cubbyH + 2 * F_BOARD_T,     // 726.7
  ];

  // F-recess cubbies — 3 compartments × 3 levels = 9 cubbies, all face west.
  for (const [zS, zN] of F_RECESS_ZS) {
    for (const yF of CUBBY_FLOORS) {
      fillCubby(
        F_FACE_X_E + F_FRONT_DEPTH, F_FACE_X_E + F_RECESS_DEPTH,
        yF,
        zS - F_SIDE_WIDEN, zN + F_SIDE_WIDEN,
        '-x',
        3
      );
    }
  }

  // Corner F-branch cubbies (face west).
  for (const yF of CUBBY_FLOORS) {
    fillCubby(
      F_FACE_X_E, F_FACE_X_E + CORNER_F_DEPTH,
      yF,
      CORNER_F_REGION.zS, CORNER_F_REGION.zN,
      '-x',
      2
    );
  }

  // Corner E-branch cubbies (face north).
  for (const yF of CUBBY_FLOORS) {
    fillCubby(
      CORNER_E_WEST_X, F_FACE_X_E,
      yF,
      CORNER_E_REGION.zS, CORNER_E_REGION.zN,
      '+z',
      1
    );
  }
}

// ---- Cab-textured back panels for F recesses and corner L-cavity ----
// Override the cabinet body's back walls inside each cavity with a thin
// cab-textured overlay so each cubby reads against a wood-finish back.

const BACK_Y_BOT  = 150 + F_WALL_Y_KEEP;   // 200 (top of bottom cover)

const BACK_H      = BACK_Y_TOP - BACK_Y_BOT;
const BACK_Y_C    = (BACK_Y_BOT + BACK_Y_TOP) / 2;

function addBackPanel(xC, yC, zC, dx, dy, dz) {

// F recesses: back wall is the east wall of the wide cavity (x = xI + totalDepth).

  );

// Corner L-cavity: F-branch backs against east wall (x=2330); E-branch backs
// against south wall (z=620).
{
  const cF_xE = F_FACE_X_E + CORNER_F_DEPTH;   // 2330
  const cF_zN = CORNER_F_NORTH_Z;              // 1005
  const c_zS  = DEPTH - 50 - CORNER_E_DEPTH;   // 620
  const c_xW  = CORNER_E_WEST_X;               // 1790

  addBackPanel(

  addBackPanel(

  );
}

// ----- Brushed-brass 1" foot rest pipe along B and C -----
const PIPE_R      = 19;     // 38 mm OD
const PIPE_Y      = 281;    // pipe centre 281 mm above floor (top at 300 mm)
const PIPE_OFFSET = 160;    // pipe centre 160 mm out from cabinet face

const pipeMat = new THREE.MeshStandardMaterial({
  color: 0x9a9a9a,
  roughness: 0.4,
  metalness: 0.85,
});
function addFootRest(faceAxis, faceCoord, alongStart, alongEnd, outwardSign, offset = PIPE_OFFSET) {
  const len      = alongEnd - alongStart;
  const alongMid = (alongStart + alongEnd) / 2;
  const offsetC  = faceCoord + outwardSign * offset;

  const pipeGeom = new THREE.CylinderGeometry(PIPE_R, PIPE_R, len, 24);
  const pipe = new THREE.Mesh(pipeGeom, pipeMat);
  if (faceAxis === 'x') {
    pipe.rotation.x = Math.PI / 2;   // align pipe with z
    pipe.position.set(offsetC, PIPE_Y, alongMid);
  } else {
    pipe.rotation.z = Math.PI / 2;   // align pipe with x
    pipe.position.set(alongMid, PIPE_Y, offsetC);
  }
  pipe.castShadow = true; pipe.receiveShadow = true;
  island.add(pipe);
}

// Pipe centerlines: B at x = 2400 + 160 = 2560, C at z = 300 - 160 = 140,
// A at z = 2850 + 90 = 2940. Two 100 mm bends wrap both outside corners.
const BEND_R = 100;
addFootRest('x', 2400, /*z*/  240, 2840, +1);          // B side, between both bends
addFootRest('z',  300, /*x*/    0, 2460, -1);          // C side, to corner 1
addFootRest('z', 2850, /*x*/ 2020, 2460, +1, 90);      // A side, bend3 → corner 2
addFootRest('x', 2080, /*z*/  880, 2840, -1);          // F side (in concave notch)

// Wall-to-pipe brackets — placed at the midpoint between each pair of adjacent
// corbels so the brackets line up with the corbels rather than splitting them.
const bracketGeom = new THREE.CylinderGeometry(6, 6, PIPE_OFFSET, 14);
function addBracket(faceAxis, faceCoord, along, outwardSign, offset = PIPE_OFFSET) {
  const halfOff = faceCoord + outwardSign * offset / 2;
  const geom = offset === PIPE_OFFSET
    ? bracketGeom
    : new THREE.CylinderGeometry(6, 6, offset, 14);
  const b = new THREE.Mesh(geom, pipeMat);
  if (faceAxis === 'x') {
    b.rotation.z = Math.PI / 2;
    b.position.set(halfOff, PIPE_Y, along);
  } else {
    b.rotation.x = Math.PI / 2;
    b.position.set(along, PIPE_Y, halfOff);
  }
  b.castShadow = true;
  island.add(b);
}
// Brackets sit AT the corbel centerlines so each support appears to emerge
// from inside a corbel rather than land in the gap between two corbels.
// B corbels are centered at "along" (no Y rotation); F corbels are rendered
// with rotation.y = π so their world-z center is "along − COR_W".
for (const sy of [400, 987.5, 1575, 2162.5, 2750])     addBracket('x', 2400, sy,        +1);  // B
for (const sx of [100, 650, 1200, 1750, 2300])         addBracket('z',  300, sx,        -1);  // C
for (const sy of [1100, 1650, 2200, 2750])             addBracket('x', 2080, sy - COR_W, -1); // F

const bendGeom = new THREE.TorusGeometry(BEND_R, PIPE_R, 14, 24, Math.PI / 2);

// Corner 1 — B ↔ C bend (outside corner near +x, -z), centre (2460, 240).

function makePlinthLabel(text, x, y, z, rotY, size = 0.10) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(210, 210, 210, 0.92)';
  ctx.font = 'bold 220px -apple-system, "Helvetica Neue", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 142);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(size, size), mat);
  mesh.rotation.y = rotY;
  mesh.position.set(x, y, z);
  mesh.renderOrder = 10;
  return mesh;
}

// ----- Bar stools -----
function makeStool(x, z, rotY = 0) {
  const g = new THREE.Group();

  const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.04, 36), stoolSeatMat);
  seat.position.y = 0.75;
  seat.castShadow = true; seat.receiveShadow = true;
  g.add(seat);

  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.024, 0.024, 0.73, 18), stoolLegMat);
  post.position.y = 0.365;
  post.castShadow = true;
  g.add(post);

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.02, 36), stoolLegMat);
  base.position.y = 0.012;
  base.castShadow = true; base.receiveShadow = true;
  g.add(base);

  // 1/3-circle footrest centered on local +z (toward the bar for both stool sets).
  const ringGeom = new THREE.TorusGeometry(0.16, 0.012, 10, 28, 2 * Math.PI / 3);
  ringGeom.rotateZ(Math.PI / 6);
  ringGeom.rotateX(Math.PI / 2);
  const ring = new THREE.Mesh(ringGeom, stoolLegMat);
  ring.position.y = 0.34;
  ring.castShadow = true;
  g.add(ring);

  // Two radial arms tying the arc back to the central post. Arms start inside
  // the post (so the inner cap is hidden) and end at the arc centerline; a
  // small sphere welds each arm to the arc end.
  const POST_R = 0.024, RING_R = 0.16, TUBE_R = 0.012;
  const armLen = RING_R;
  const armGeom = new THREE.CylinderGeometry(TUBE_R, TUBE_R, armLen, 12);
  const jointGeom = new THREE.SphereGeometry(TUBE_R, 12, 10);
  const up = new THREE.Vector3(0, 1, 0);
  for (const sign of [1, -1]) {
    const dir = new THREE.Vector3(sign * Math.sqrt(3) / 2, 0, 0.5);  // unit radial
    const arm = new THREE.Mesh(armGeom, stoolLegMat);
    arm.position.set(dir.x * armLen / 2, 0.34, dir.z * armLen / 2);
    arm.quaternion.setFromUnitVectors(up, dir);
    arm.castShadow = true;
    g.add(arm);

    const joint = new THREE.Mesh(jointGeom, stoolLegMat);
    joint.position.set(dir.x * RING_R, 0.34, dir.z * RING_R);
    joint.castShadow = true;
    g.add(joint);
  }

  g.position.set(x, 0, z);
  g.rotation.y = rotY;
  return g;
}

// C unit world x: 0.43 → 1.35 m, center ≈ 0.89.
// Pendants live in the C-only z-range (z > B-front, ~-0.58 → +1.5).
const pendantShadeMat = new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.9 });
const pendantCordMat  = new THREE.MeshStandardMaterial({ color: 0x202020, roughness: 0.9 });
const pendantBulbMat  = new THREE.MeshBasicMaterial({ color: 0xfff0c8 });

function addPendant(x, z) {
  const yCordTop = 2.6;
  const yShadeTop = 1.95;
  const yShadeBot = 1.78;

  const cordH = yCordTop - yShadeTop;
  const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, cordH, 8), pendantCordMat);
  cord.position.set(x, (yCordTop + yShadeTop) / 2, z);
  presentationGroup.add(cord);

  const shade = new THREE.Mesh(
    new THREE.CylinderGeometry(0.055, 0.105, yShadeTop - yShadeBot, 24, 1, true),
    pendantShadeMat
  );
  shade.material.side = THREE.DoubleSide;
  shade.position.set(x, (yShadeTop + yShadeBot) / 2, z);

  bulb.position.set(x, yShadeBot + 0.015, z);

// Pendants spread evenly along the L-shape centerline: run along C at
// z = C_CENTER_Z, turn at the L vertex, continue along B at x = B_CENTER_X.
// The middle pendant sits exactly at the corner so it stays Z-aligned with
// the C pendants on one side and X-aligned with the B pendants on the other.
const C_CENTER_Z = -1.04;
const B_CENTER_X =  0.89;
const C_START_X  = -1.35;
const B_END_Z    =  1.5;
const C_ARM_LEN = B_CENTER_X - C_START_X;     // 2.24
const B_ARM_LEN = B_END_Z   - C_CENTER_Z;     // 2.54
const TOTAL_LEN = C_ARM_LEN + B_ARM_LEN;       // 4.78
const STEP = TOTAL_LEN / 5;                    // 0.956
for (let i = -2; i <= 2; i++) {
  const s = C_ARM_LEN + i * STEP;
  let x = s < C_ARM_LEN ? C_START_X + s : B_CENTER_X;
  const z = s < C_ARM_LEN ? C_CENTER_Z : C_CENTER_Z + (s - C_ARM_LEN);
  if (i === -2) x += 0.2;   // pull the westmost lamp 200 mm east
  if (i === -1) x += 0.1;   // shift its neighbour 100 mm east
  addPendant(x, z);
}

// ----- Compass marker on the floor (in the E/F concave notch) -----
// Establishes a shared direction language: +z = N, -z = S, +x = E, -x = W.
function makeCompassTexture(px = 512) {
  const c = document.createElement('canvas');
  c.width = c.height = px;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(154, 154, 154, 1.0)';   // match the general floor grey
  ctx.beginPath(); ctx.arc(px / 2, px / 2, px / 2 - 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(30, 30, 30, 0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(px / 2, px / 2, px / 2 - 8, 0, Math.PI * 2); ctx.stroke();
  ctx.save();
  ctx.strokeStyle = 'rgba(30, 30, 30, 0.8)';
  ctx.lineWidth = 2;
  const lineStart = px * 0.22;
  const lineEnd   = px * 0.78;
  ctx.beginPath();
  ctx.moveTo(px / 2, lineStart); ctx.lineTo(px / 2, lineEnd);
  ctx.moveTo(lineStart, px / 2); ctx.lineTo(lineEnd, px / 2);
  ctx.stroke();
  ctx.restore();
  // Canvas top maps to world -z after rotation.x = -π/2, so 'S' goes on top
  // and 'N' on bottom for the label to read correctly when viewed from above.
  ctx.fillStyle = 'rgba(20, 20, 20, 0.7)';
  ctx.font = `bold ${Math.floor(px * 0.14)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', px / 2,        px * 0.13);
  ctx.fillText('N', px / 2,        px * 0.87);
  ctx.fillText('W', px * 0.13,     px / 2);
  ctx.fillText('E', px * 0.87,     px / 2);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ----- Bottles and glasses on the shelves -----
function makeBottle(color, height) {
  const g = new THREE.Group();
  const bodyH = height * 0.65;
  const shoulderH = height * 0.08;
  const neckH = height * 0.22;
  const capH = height * 0.05;
  const bodyR = 0.035, neckR = 0.011;
  const glassMat = new THREE.MeshStandardMaterial({ color, roughness: 0.25, metalness: 0.08 });
  const capMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(bodyR, bodyR, bodyH, 18), glassMat);
  body.position.y = bodyH / 2;
  const shoulder = new THREE.Mesh(new THREE.CylinderGeometry(neckR, bodyR, shoulderH, 18), glassMat);
  shoulder.position.y = bodyH + shoulderH / 2;
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(neckR, neckR, neckH, 14), glassMat);
  neck.position.y = bodyH + shoulderH + neckH / 2;
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(neckR * 1.15, neckR * 1.15, capH, 14), capMat);
  cap.position.y = bodyH + shoulderH + neckH + capH / 2;
  for (const m of [body, shoulder, neck, cap]) { m.castShadow = true; g.add(m); }
  return g;
}

function makeGlass(height, radius) {
  const g = new THREE.Group();
  const m = new THREE.MeshStandardMaterial({
    color: 0xc8d8dc, roughness: 0.1, metalness: 0.15,
    transparent: true, opacity: 0.55,
  });
  const cup = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius * 0.82, height, 20), m);
  cup.position.y = height / 2;   // group origin is the base of the glass
  cup.castShadow = true;
  g.add(cup);
  return g;
}

  [0, () => makeBottle(0xe6d699, 0.27), -0.88],
  [0, () => makeGlass(0.10, 0.045),     -0.68],
  // Middle shelf — row of glassware
  [1, () => makeGlass(0.13, 0.038),     -1.35],
  [1, () => makeGlass(0.13, 0.038),     -1.18],
  [1, () => makeGlass(0.13, 0.038),     -1.01],
  [1, () => makeGlass(0.13, 0.038),     -0.84],
  [1, () => makeGlass(0.13, 0.038),     -0.67],
  // Top shelf — taller bottles
  [2, () => makeBottle(0x4a1f2a, 0.32), -1.30],
  [2, () => makeBottle(0xb89066, 0.27), -1.06],
  [2, () => makeBottle(0x1c2a4a, 0.30), -0.82],
];
for (const [shelfIdx, make, z] of shelfItems) {
  const item = make();
  const yTop = SHELF_Y_BASE + shelfIdx * SHELF_GAP + SHELF_T / 2;
  item.position.set(SHELF_X, yTop, z);
  presentationGroup.add(item);
}

// ----- Render loop -----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

(function animate() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
})();
</script>
